        <style>
        html, body, #map {
            width: 100%;

        }
        

        /* Home (recenter) control */

                }
        
                /* Matrículas label background (tooltip) */

                    border: none !important;
                    box-shadow: none !important;
                }

                    background: rgba(255,255,255,0.92);
                    border: 1px solid rgba(0,0,0,0.25);
                    border-radius: 6px;

                /* Toggle Matrículas labels */

                /* Mobile tweaks */

                    }
                    body.layers-open .map-title{display:none;}
                    .map-title .t1{

                    }
                    .map-title .t2{

                    }
                    .map-logo img{

                    max-width: 32vw;

                }
                    .leaflet-control-home a{

                        height: 34px;
                        line-height: 34px;
                    }
                }
                
                /* ===== EcoMap Controls (Measure) ===== */
                .ecomap-controls.leaflet-bar a{
                    width:34px; height:34px;
                    line-height:34px;
                    text-align:center;
                    font-size:16px;
                }
                .ecomap-controls.leaflet-bar a,

                    border-bottom: 1px solid rgba(0,0,0,0.08);
                }
                .ecomap-controls.leaflet-bar a:last-child{

                }
                .ecomap-controls .is-active{

                .ecomap-measure-tooltip{

                }
        
                .ecomap-hint{

                /* ===== EcoMap Controls (Anotações) ===== */
                .ecomap-notes-controls.leaflet-bar a{

                    text-align:center;

                }
                .ecomap-notes-controls.leaflet-bar a,

                    border-bottom: 1px solid rgba(0,0,0,0.08);
                }
                .ecomap-notes-controls.leaflet-bar a:last-child{

                .ecomap-notes-controls .is-active{

        /* ===== EcoMap Controls: grupos colapsáveis (Trena / Anotações) ===== */

        /* garante centralização dos ícones dentro dos botões */

        /* durante desenho (Leaflet.draw), o polígono/linha temporários não podem "capturar" clique.
           isso permite adicionar vértice mesmo clicando dentro do polígono em criação */

        /* EcoMap - Tabela flutuante de anotações */
          #ecomapNotesTablePanel{
            position:absolute;
            /* mantém a tabela sempre à direita da coluna de botões (evita sobreposição) */

            right: 10px;
            bottom: 56px;

            font-size:12px;
            box-shadow:0 6px 18px rgba(0,0,0,0.35);
            display:none;
          }
          /* tabela mais “enxuta” (sem espaço vazio à direita) */
          #ecomapNotesTablePanel table{
            width:100%;
            border-collapse:collapse;
            table-layout:auto;          /* permite a coluna de medições crescer */
            min-width: 620px;           /* força scroll horizontal no mobile quando necessário */
          }
          #ecomapNotesTablePanel th:nth-child(1), #ecomapNotesTablePanel td:nth-child(1){ width:38%; }
          #ecomapNotesTablePanel th:nth-child(2), #ecomapNotesTablePanel td:nth-child(2){ width:18%; }
          #ecomapNotesTablePanel th:nth-child(3), #ecomapNotesTablePanel td:nth-child(3){ width:44%; }
        
          #ecomapNotesTablePanel th, #ecomapNotesTablePanel td{
            white-space:nowrap;

          /* mantém elipse só nas colunas curtas */

          #ecomapNotesTablePanel th:nth-child(2), #ecomapNotesTablePanel td:nth-child(2){
            overflow:hidden;

          /* coluna de medições: mostra completo (com rolagem horizontal) */

          @media (max-width: 768px){

          #ecomapNotesTablePanel table{
            width:100%;

                /* ===== Anotações: reduzir área clicável dos vértices (evita "travamento" perto do 1º ponto em zoom baixo) ===== */

          @media (max-width: 768px){

        /* ===== EcoMap: Legenda de Declividade ===== */

        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1, preferCanvas:true
        }).fitBounds([[-27.242106480611206,-51.488639088630656],[-27.227699379468195,-51.45838419239216]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        L.control.locate({locateOptions: {maxZoom: 19}}).addTo(map);
/* ====== Home / Recenter control (Casinha) ====== */
        var HomeControl = L.Control.extend({
            options: { position: 'topleft' },
            onAdd: function(map) {
                var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-home');
                var link = L.DomUtil.create('a', '', container);
                link.href = '#';
                link.title = 'Recentrar a ortofoto';
                link.setAttribute('aria-label', 'Recentrar a ortofoto');
                link.innerHTML = '<i class="fas fa-home"></i>';
                L.DomEvent.disableClickPropagation(container);
                L.DomEvent.on(link, 'click', function(e) {
                    L.DomEvent.stop(e);
                    if (bounds_group && bounds_group.getBounds && bounds_group.getBounds().isValid()) {
                        map.fitBounds(bounds_group.getBounds(), {padding: [20, 20]});
                    }
                });
                return container;
            }
        });
        map.addControl(new HomeControl());
        // ===== Trena EcoMap (com casas decimais + área/perímetro) =====
        // Como usar:
        // 1) Clique na régua para ativar
        // 2) Clique no mapa para adicionar pontos
        // 3) Duplo-clique para finalizar
        // 4) Botão 🗑 para limpar
        var hintEl = document.getElementById('ecomapHint');

        function showHint(html){
            if(!hintEl) return;
            hintEl.innerHTML = html;
            hintEl.style.display = 'block';
        }
        function hideHint(){
            if(!hintEl) return;
            hintEl.style.display = 'none';
        }

        function formatPtBR(n, decimals){
            try{
                return n.toLocaleString('pt-BR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
            }catch(e){
                var s = n.toFixed(decimals);
                return s.replace('.', ',');
            }
        }

        function formatArea(m2){
            if(m2 >= 10000){
                return formatPtBR(m2/10000, 4) + ' ha';
            }
            return formatPtBR(m2, 2) + ' m²';
        }

        // Cálculo de área geodésica (sem dependências externas)
        // Fórmula esférica (variação Chamberlain & Duquette), usada em diversas ferramentas Leaflet.
        function geodesicArea(latLngs){
            var points = latLngs;
            if(!points || points.length < 3) return 0;

            var radius = 6378137; // WGS84 (m)
            var area = 0;

            for (var i = 0, len = points.length; i < len; i++) {
                var p1 = points[i];
                var p2 = points[(i + 1) % len];

                var lon1 = p1.lng * Math.PI / 180;
                var lon2 = p2.lng * Math.PI / 180;
                var lat1 = p1.lat * Math.PI / 180;
                var lat2 = p2.lat * Math.PI / 180;

                area += (lon2 - lon1) * (2 + Math.sin(lat1) + Math.sin(lat2));
            }

            area = area * radius * radius / 2.0;
            return Math.abs(area);
        }

        function formatDistance(meters){
            if(meters >= 1000){
                return formatPtBR(meters/1000, 3) + ' km';
            }
            return formatPtBR(meters, 2) + ' m';
        }

        var measureActive = false;
        var measurePolygon = null;
        var measurePoints = [];
        var measureLine = null;
        var tempLine = null;
        
// Pane acima dos overlays para desenhar a Trena EcoMap sempre visível
map.createPane('pane_EcoMapMeasure');
map.getPane('pane_EcoMapMeasure').style.zIndex = 100000;
// Renderer dedicado para garantir que os vetores da trena sejam desenhados neste pane
var ecomapMeasureRenderer = L.svg({ pane: 'pane_EcoMapMeasure' });
// Garante que a trena fique sempre ACIMA dos ortomosaicos (panes do qgis2web)
function ecomapBringMeasureToFront(){
    try{
        // pane da trena
        var p = map.getPane('pane_EcoMapMeasure');
        if(p) p.style.zIndex = 100000;

        // tooltips/popups acima também
        var tp = map.getPane('tooltipPane');
        if(tp) tp.style.zIndex = 110000;
        var pp = map.getPane('popupPane');
        if(pp) pp.style.zIndex = 110000;

        // paths já desenhados
        if(measureLayer && measureLayer.eachLayer){
            measureLayer.eachLayer(function(lyr){
                if(lyr && lyr.bringToFront) lyr.bringToFront();
            });
        }
    }catch(e){}
}

// deixa os cliques passarem para o mapa (a trena não precisa capturar eventos)
map.getPane('pane_EcoMapMeasure').style.pointerEvents = 'none';

var measureLayer = L.layerGroup().addTo(map);
        ecomapBringMeasureToFront();
        var measureTooltip = L.tooltip({
            permanent:false,
            direction:'top',
            offset:[0,-12],
            className:'ecomap-measure-tooltip',
            opacity:1
        });

        function computeTotalDistance(points){
            var total = 0;
            for(var i=1;i<points.length;i++){
                total += map.distance(points[i-1], points[i]);
            }
            return total;
        }

        function clearMeasure(){
            measurePoints = [];
            measureLayer.clearLayers();
            if(measureLine){ map.removeLayer(measureLine); measureLine = null; }

                pane: 'pane_EcoMapMeasure',

                measureLine = L.polyline([p], { pane: 'pane_EcoMapMeasure', renderer: ecomapMeasureRenderer, color:'#111', weight:3, opacity:0.9 }).addTo(measureLayer);
            }

            var total = computeTotalDistance(measurePoints);
            var perimetro = total;
            var areaTxt = '';

                try{ area = geodesicArea(measurePoints); }catch(err){ area = 0; }
                areaTxt = '<br><span style="font-weight:700">Área: ' + formatArea(area) + '</span>';

        function onMapMove(e){
            if(!measureActive) return;

            if(!tempLine){
                tempLine = L.polyline([last, cur], { pane: 'pane_EcoMapMeasure', renderer: ecomapMeasureRenderer, color:'#111', weight:2, opacity:0.45, dashArray:'6,6' }).addTo(measureLayer);

            var total = computeTotalDistance(measurePoints);
            var segment = map.distance(last, cur);
            var perimetro = total + segment;

            var areaTxt = '';
            if(measurePoints.length >= 2){
                var area = 0;
                try{
                    var pts = measurePoints.concat([cur]);
                    if(pts.length >= 3){

function disableAllVectorPopups(){
    function killPopupOnLayer(l){
        if(!l) return;
        try{
            if(typeof l.closePopup === 'function') l.closePopup();
            if(typeof l.unbindPopup === 'function') l.unbindPopup();
            // remove handler de click (qgis2web usa click para abrir popup)
            if(typeof l.off === 'function'){
                try{ l.off('click'); }catch(e){}
                try{ l.off('popupopen'); }catch(e){}
            }
        }catch(e){}
    }

    try{
        map.eachLayer(function(lyr){
            killPopupOnLayer(lyr);

            // sublayers (geojson/feature groups)
            if(lyr && lyr.options && lyr.options.layerName === 'layer_ContagemdePinus_11'){
                return;
            }
            if(lyr && typeof lyr.eachLayer === 'function'){
                try{
                    lyr.eachLayer(function(sl){
                        killPopupOnLayer(sl);
                        // alguns geojson tem sub-sub-layers
                        if(sl && typeof sl.eachLayer === 'function'){
                            try{ sl.eachLayer(killPopupOnLayer); }catch(e){}
                        }
                    });
                }catch(e){}
            }
        });
    }catch(e){}
}

function fmtMeters(m){
  if (!isFinite(m)) return '-';
  return (m >= 1000) ? (m/1000).toFixed(2).replace('.',',') + ' km' : m.toFixed(2).replace('.',',') + ' m';
}
function fmtArea(a){
  if (!isFinite(a)) return '-';
  return (a/10000).toFixed(4).replace('.',',') + ' ha';
}
function lineLength(latlngs){
  var sum = 0;
  for (var i=1;i<latlngs.length;i++){ sum += map.distance(latlngs[i-1], latlngs[i]); }
  return sum;
}
function polygonPerimeter(latlngs){
  if (latlngs.length < 2) return 0;
  var sum = lineLength(latlngs);
  sum += map.distance(latlngs[latlngs.length-1], latlngs[0]);
  return sum;
}
function polygonArea(latlngs){
  try {
    if (L.GeometryUtil && typeof L.GeometryUtil.geodesicArea === 'function'){
      return Math.abs(L.GeometryUtil.geodesicArea(latlngs));
    }
  } catch(e) {}
  return NaN;
}

function toDMS(deg, isLat){
  // Converte graus decimais para DMS, sem casas decimais nos segundos
  var hemi = isLat ? (deg < 0 ? 'S' : 'N') : (deg < 0 ? 'W' : 'E');
  var abs = Math.abs(deg);
  var d = Math.floor(abs);
  var minFloat = (abs - d) * 60;
  var m = Math.floor(minFloat);
  var secFloat = (minFloat - m) * 60;
  var s = Math.round(secFloat);

  // normaliza arredondamentos (ex.: 59.9 -> 60)
  if(s === 60){ s = 0; m += 1; }
  if(m === 60){ m = 0; d += 1; }

  return d + '°' + String(m).padStart(2,'0') + "'" + String(s).padStart(2,'0') + '"' + hemi;
}


function refreshNotesTable(){
  var panel = document.getElementById('ecomapNotesTablePanel');
  var wrap = document.getElementById('ecomapNotesTableWrap');
  if (!panel || !wrap) return;

  
  var tableBtn = window._ecomapNotesTableBtn || null;
  if (tableBtn){ tableBtn.style.display = 'none'; }
// se as ferramentas de anotação estiverem recolhidas, a tabela deve ficar oculta
  if (!notesToolsOpen){
    panel.style.display = 'none';
    return;
  }

  var rows = [];
  notesLayer.eachLayer(function(l){
    var type = (l instanceof L.Marker) ? 'Ponto' : (l instanceof L.Polygon && !(l instanceof L.Rectangle) ? 'Polígono' : (l instanceof L.Polyline ? 'Linha' : 'Feição'));
    var name = (l.feature && l.feature.properties && (l.feature.properties.note || l.feature.properties.name)) ? (l.feature.properties.note || l.feature.properties.name) : '(sem nome)';
    var metric = '-';
    if (l instanceof L.Marker){
      var pt = l.getLatLng ? l.getLatLng() : null;
      if(pt){
        metric = 'Lat: ' + toDMS(pt.lat, true) + ' | Lon: ' + toDMS(pt.lng, false);
      }
    }
    if (l instanceof L.Polyline && !(l instanceof L.Polygon)){
      var ll = l.getLatLngs();
      metric = fmtMeters(lineLength(ll));
    } else if (l instanceof L.Polygon){
      var ring = l.getLatLngs();
      ring = Array.isArray(ring) && Array.isArray(ring[0]) ? ring[0] : ring;
      var a = polygonArea(ring);
      var p = polygonPerimeter(ring);
      metric = fmtArea(a) + ' | ' + fmtMeters(p);
    }
    rows.push({name:name, type:type, metric:metric});
  });

  if (rows.length === 0){
    panel.style.display = 'none';
    wrap.innerHTML = '';
    if (tableBtn){ tableBtn.style.display = 'none'; }
    return;
  }

  // há feições: habilita botão da tabela (no mobile)
  if (tableBtn){ tableBtn.style.display = ''; }

  // respeitar o estado recolhida/aberta (desktop + mobile)
  if (!notesTableVisible){
    panel.style.display = 'none';
    return;
  }

  var html = '<table><thead><tr><th>Nome</th><th>Tipo</th><th>Medições</th></tr></thead><tbody>';
  rows.forEach(function(r){
    html += '<tr><td>'+String(r.name).replace(/</g,'&lt;')+'</td><td>'+r.type+'</td><td>'+r.metric+'</td></tr>';
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
  panel.style.display = 'block';
}

(function(){

  try{ if(drawPolygon && drawPolygon.options) drawPolygon.options.finishOnDoubleClick = false; }catch(e){}

  function gateFinish(handler){
    if(!handler || handler.__ecomapFinishGated) return;
    handler.__ecomapFinishGated = true;
    var origFinish = handler._finishShape;
    if(typeof origFinish !== 'function') return;

    handler._finishShape = function(){
      if(!this._ecomapAllowFinish){
        return; // bloqueia qualquer finalização por gesto/clique
      }
      return origFinish.apply(this, arguments);
    };
  }

  gateFinish(drawPolyline);
  gateFinish(drawPolygon);

  function bindButtons(){
    var btnFinish = document.getElementById('ecomapBtnFinish');
    var btnCancel = document.getElementById('ecomapBtnCancel');
    if(!btnFinish || !btnCancel) return;

    btnFinish.addEventListener('click', function(){
      var h = _ecomapGetActiveDrawHandler();
      if(!h) return;
      try{
        h._ecomapAllowFinish = true;
        if(typeof h._finishShape === 'function') h._finishShape();
      }catch(e){}
      try{ h._ecomapAllowFinish = false; }catch(e){}
    });

    btnCancel.addEventListener('click', function(){
      var h = _ecomapGetActiveDrawHandler();
      try{ if(h) h.disable(); }catch(e){}
      try{ stopAllNoteModes && stopAllNoteModes(); }catch(e){}
      showFinishBar(false);
    });
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', bindButtons);

})();

// ===== Exportação GeoJSON =====
function downloadTextFile(filename, textContent){
    var blob = new Blob([textContent], {type: 'application/geo+json;charset=utf-8'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 800);
}

function exportNotesGeoJSON(){
    try{
        if(!notesLayer || notesLayer.getLayers().length === 0){
            alert('Não há anotações para exportar.');
            return;
        }
        var gj = notesLayer.toGeoJSON();
        // garantia: incluir CRS não é padrão no GeoJSON moderno, então omitimos.
        var txt = JSON.stringify(gj, null, 2);
        var fname = 'anotacoes_cerro_verde_' + (new Date().toISOString().slice(0,10)) + '.geojson';
        downloadTextFile(fname, txt);
    }catch(e){
        alert('Falha ao exportar anotações.');
    }
}

function clearAllNotes(){
    if(!notesLayer) return;
    var ok = confirm('Apagar TODAS as anotações desta sessão?');
    if(!ok) return;
    notesLayer.clearLayers();
    hideHint();
}

        /* ===== EcoMap: Contagem de Pinus em Canvas direto =====
           Motivo: a camada possui muitos pontos. Criar um circleMarker Leaflet para
           cada indivíduo trava o navegador ao habilitar a camada. Esta versão desenha
           direto no Canvas, em blocos, sem criar milhares de objetos Leaflet.
        */
        var layer_ContagemdePinus_11 = L.Layer.extend({
            options: {
                layerName: 'layer_ContagemdePinus_11',
                pane: 'pane_ContagemdePinus_11',
                interactive: false
            },

            initialize: function(data, options) {
                L.setOptions(this, options);
                this._data = data || {};
                this._canvas = null;
                this._ctx = null;
                this._frame = null;
                this._drawToken = 0;
                this._chunkSize = 2500;
                this._radius = 2.6;
                this._fillColor = 'rgba(219,30,42,0.92)';
            },

            onAdd: function(map) {
                this._map = map;
                this._canvas = L.DomUtil.create('canvas', 'leaflet-layer ecomap-contagem-canvas');
                this._canvas.style.pointerEvents = 'none';

                var pane = map.getPane(this.options.pane) || map.getPane('overlayPane');
                pane.appendChild(this._canvas);

                this._ctx = this._canvas.getContext('2d', { alpha: true });

                map.on('moveend zoomend resize viewreset', this._resetAndDraw, this);
                this._resetAndDraw();
            },

            onRemove: function(map) {
                this._drawToken++;
                if (this._frame) {
                    cancelAnimationFrame(this._frame);
                    this._frame = null;
                }
                map.off('moveend zoomend resize viewreset', this._resetAndDraw, this);
                if (this._canvas && this._canvas.parentNode) {
                    this._canvas.parentNode.removeChild(this._canvas);
                }
                this._canvas = null;
                this._ctx = null;
                this._map = null;
            },

            _resetCanvas: function() {
                if (!this._map || !this._canvas) return;

                var size = this._map.getSize();
                var topLeft = this._map.containerPointToLayerPoint([0, 0]);

                L.DomUtil.setPosition(this._canvas, topLeft);
                this._canvas.width = size.x;
                this._canvas.height = size.y;
                this._canvas.style.width = size.x + 'px';
                this._canvas.style.height = size.y + 'px';
            },

            _resetAndDraw: function() {
                if (!this._map || !this._canvas || !this._ctx) return;

                this._drawToken++;
                if (this._frame) {
                    cancelAnimationFrame(this._frame);
                    this._frame = null;
                }

                this._resetCanvas();

                var ctx = this._ctx;
                var size = this._map.getSize();
                ctx.clearRect(0, 0, size.x, size.y);

                this._drawProgressive(this._drawToken);
            },

            _drawProgressive: function(token) {
                if (!this._map || !this._ctx || token !== this._drawToken) return;

                var features = (this._data && this._data.features) ? this._data.features : [];
                var total = features.length;
                var index = 0;
                var ctx = this._ctx;
                var map = this._map;
                var bounds = map.getBounds().pad(0.03);
                var radius = this._radius;
                var chunkSize = this._chunkSize;
                var self = this;

                ctx.fillStyle = this._fillColor;

                function drawPoint(lng, lat) {
                    if (lat == null || lng == null) return;
                    if (!bounds.contains([lat, lng])) return;

                    var pt = map.latLngToContainerPoint([lat, lng]);

                    // pequena margem para pontos próximos às bordas
                    if (pt.x < -8 || pt.y < -8 || pt.x > map.getSize().x + 8 || pt.y > map.getSize().y + 8) return;

                    ctx.beginPath();
                    ctx.arc(pt.x, pt.y, radius, 0, Math.PI * 2, false);
                    ctx.fill();
                }

                function drawFeature(feature) {
                    if (!feature || !feature.geometry) return;
                    var geom = feature.geometry;
                    var coords = geom.coordinates;

                    if (!coords) return;

                    if (geom.type === 'Point') {
                        drawPoint(coords[0], coords[1]);
                    } else if (geom.type === 'MultiPoint') {
                        for (var j = 0; j < coords.length; j++) {
                            drawPoint(coords[j][0], coords[j][1]);
                        }
                    }
                }

                function step() {
                    if (token !== self._drawToken || !self._map || !self._ctx) return;

                    var end = Math.min(index + chunkSize, total);
                    for (; index < end; index++) {
                        drawFeature(features[index]);
                    }

                    if (index < total) {
                        self._frame = requestAnimationFrame(step);
                    } else {
                        self._frame = null;
                    }
                }

                step();
            }
        });

        layer_ContagemdePinus_11 = new layer_ContagemdePinus_11(json_ContagemdePinus_11);
